name: Build Windows Release

on:
  release:
    types: [created]

  workflow_dispatch:
    inputs:
      test_version:
        required: true
        default: 'v1.1'
      upload_to_release:
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    env:
      VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.test_version || github.event.release.tag_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'
          cache: 'pip'

      - name: Build with Nuitka (CI mode)
        env:
          CI: "true"
          PYTHON UNBUFFERED: "1"
        run: python build.py

      - name: Build Inno Setup Installer
        run: iscc /dMyAppVersion="${{ env.VERSION }}" installer.iss

      - name: Upload Installer as Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PLauncher-${{ env.VERSION }}-windows-installer
          path: output/PLauncher-${{ env.VERSION }}-setup.exe
          retention-days: 3

      - name: Upload Installer to GitHub Release
        if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.upload_to_release) }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          files: output/PLauncher-${{ env.VERSION }}-setup.exe
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
          make_latest: true