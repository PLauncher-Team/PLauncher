name: Build Windows Release

on:
  release:
    types: [created]

  workflow_dispatch:
    inputs:
      test_version:
        required: true
        default: 'v1.1.0-test'
      upload_to_release:
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'
          cache: 'pip'

      - name: Build with Nuitka (CI mode)
        env:
          CI: "true"
          PYTHONUNBUFFERED: "1"
        run: python build.py

      - name: Prepare release asset
        run: |
          cd dist
          ren main.dist PLauncher
          Compress-Archive -Path PLauncher -DestinationPath "../PLauncher-${{ inputs.test_version || github.event.release.tag_name }}-windows.zip" -Force

      - name: Upload ZIP as Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PLauncher-${{ inputs.test_version || github.event.release.tag_name }}-windows
          path: PLauncher-${{ inputs.test_version || github.event.release.tag_name }}-windows.zip
          retention-days: 3
      
      - name: Upload ZIP to GitHub Release
        if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.upload_to_release == 'true') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.test_version || github.event.release.tag_name }}
          files: |
            PLauncher-${{ inputs.test_version || github.event.release.tag_name }}-windows.zip
            checksum.txt