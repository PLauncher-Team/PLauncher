name: Build Windows Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x64'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka==2.7.16

      - name: Build with Nuitka (CI mode)
        env:
          CI: "true"
        run: python build.py

      - name: Create release asset (zip)
        run: |
          cd dist
          ren main.dist PLauncher
          Compress-Archive -Path PLauncher -DestinationPath "../PLauncher-${{ github.event.release.tag_name }}-windows.zip" -Force

      - name: Upload ZIP to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: PLauncher-${{ github.event.release.tag_name }}-windows.zip