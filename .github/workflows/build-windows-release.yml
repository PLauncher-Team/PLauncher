name: Build Windows Release

on:
  release:
    types: [created]

  workflow_dispatch:
    inputs:
      test_version:
        required: true
        default: 'v1.1'
      upload_to_release:
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    env:
      VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.test_version || github.event.release.tag_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'
          cache: 'pip'

      - name: Cache .venv and Nuitka compiler cache
        uses: actions/cache@v4
        with:
          path: |
            .venv
            ${{ env.LOCALAPPDATA }}\Nuitka\Nuitka
          key: ${{ runner.os }}-nuitka-${{ hashFiles('**/requirements.txt', 'build.py') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nuitka-${{ hashFiles('**/requirements.txt', 'build.py') }}-
            ${{ runner.os }}-nuitka-

      - name: Build with Nuitka (CI mode)
        env:
          CI: "true"
          PYTHONUNBUFFERED: "1"
        run: python build.py

      - name: Build Inno Setup Installer
        run: iscc /dMyAppVersion="${{ env.VERSION }}" installer.iss

      - name: Upload Installer to VirusTotal
        id: vt
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_to_release }}
        shell: pwsh
        env:
          VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
        run: |
          $ErrorActionPreference = 'Stop'

          $installer = "output/PLauncher-${{ env.VERSION }}-setup.exe"
          if (-not (Test-Path $installer)) {
            throw "Installer not found: $installer"
          }

          $fileHash = (Get-FileHash -Algorithm SHA256 -Path $installer).Hash.ToLowerInvariant()
          $fileSize = (Get-Item $installer).Length

          if ($fileSize -le 32MB) {
            $response = curl.exe -sS -X POST "https://www.virustotal.com/api/v3/files" `
              -H "x-apikey: $($env:VIRUSTOTAL_API_KEY)" `
              -F "file=@$installer"
          }
          else {
            $uploadUrlResponse = curl.exe -sS -X GET "https://www.virustotal.com/api/v3/files/upload_url" `
              -H "x-apikey: $($env:VIRUSTOTAL_API_KEY)"
            $uploadUrl = ($uploadUrlResponse | ConvertFrom-Json).data

            $response = curl.exe -sS -X POST "$uploadUrl" `
              -H "x-apikey: $($env:VIRUSTOTAL_API_KEY)" `
              -F "file=@$installer"
          }

          $analysisId = ($response | ConvertFrom-Json).data.id
          $reportUrl = "https://www.virustotal.com/gui/file/$fileHash/detection"

          "analysis_id=$analysisId" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "report_url=$reportUrl" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload Installer as Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PLauncher-${{ env.VERSION }}-windows-installer
          path: output/PLauncher-${{ env.VERSION }}-setup.exe
          retention-days: 3

      - name: Upload Installer to GitHub Release
        if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.upload_to_release) }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          files: output/PLauncher-${{ env.VERSION }}-setup.exe
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
          make_latest: true

      - name: Add VirusTotal link to release description
        if: ${{ steps.vt.outputs.report_url != '' && (github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.upload_to_release)) }}
        uses: actions/github-script@v7
        with:
          script: |
            const tag = `${{ env.VERSION }}`;
            const vtUrl = `${{ steps.vt.outputs.report_url }}`;
            const note = `VirusTotal скан: ${vtUrl}`;

            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });

            const currentBody = release.data.body || '';
            const nextBody = currentBody.includes(vtUrl)
              ? currentBody
              : (currentBody ? `${currentBody}\n\n${note}` : note);

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              body: nextBody,
            });