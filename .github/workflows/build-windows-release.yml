name: Build Windows Release

on:
  release:
    types: [created]

  workflow_dispatch:
    inputs:
      test_version:
        required: true
        default: 'v1.1.0-test'
      upload_to_release:
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka==2.7.16

      - name: Build with Nuitka (CI mode)
        env:
          CI: "true"
        run: python build.py

      - name: Prepare release asset
        run: |
          cd dist
          ren main.dist PLauncher
          Compress-Archive -Path PLauncher -DestinationPath "../PLauncher-${{ inputs.test_version || github.event.release.tag_name }}-windows.zip" -Force

      - name: Calculate SHA256 checksum
        run: |
          $file = "PLauncher-${{ inputs.test_version || github.event.release.tag_name }}-windows.zip"
          $hash = (Get-FileHash $file -Algorithm SHA256).Hash
          echo "SHA256: $hash" | Out-File -FilePath "checksum.txt" -Encoding utf8
          echo "::notice::SHA256 checksum for the build: $hash"

      - name: Upload ZIP to GitHub Release
        if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.upload_to_release == 'true') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.test_version || github.event.release.tag_name }}
          files: |
            PLauncher-${{ inputs.test_version || github.event.release.tag_name }}-windows.zip
            checksum.txt